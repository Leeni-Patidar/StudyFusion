name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  ci:
    name: Validate Python App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Debug Environment
        run: |
          python --version
          pip --version
          pwd
          ls -la

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check dependency compatibility
        run: |
          echo "Running pip check..."
          pip check

      - name: Compile Python files
        run: |
          echo "Compiling Python files..."
          python -m compileall -q \
            -x '(\.git|\.venv|venv|ENV|env|__pycache__|database)' \
            .

      - name: Validate Groq configuration loader
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Validating Groq config..."
          python tools/check_groq_config.py

  package:
    name: Build Deployable Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          mkdir -p dist

          zip -r dist/studyfusion-app.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".venv/*" \
            -x "venv/*" \
            -x "ENV/*" \
            -x "env/*" \
            -x "__pycache__/*" \
            -x ".pytest_cache/*" \
            -x "*.pyc" \
            -x "*.pyo" \
            -x "*.pt" \
            -x "*.bin" \
            -x "*.ckpt" \
            -x "database/history_*.json" \
            -x "users.json" \
            -x "output.docx" \
            -x ".env"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: studyfusion-app
          path: dist/studyfusion-app.zip
          retention-days: 14
