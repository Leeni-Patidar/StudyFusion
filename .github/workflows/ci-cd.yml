name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    name: Build & Validate App
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔍 Debug environment
      - name: Debug info
        run: |
          python --version
          pip --version
          pwd
          ls -la

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping..."
          fi

      # ✅ Check dependency issues (non-breaking)
      - name: Check dependencies
        run: |
          pip check || echo "Dependency warnings found (ignored)"

      # 🧠 Compile Python files (catch syntax errors)
      - name: Compile Python files
        run: |
          python -m compileall -q .

      # 🔑 Optional: Validate environment (SAFE)
      - name: Validate environment variables
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "⚠️ GROQ_API_KEY not set (skipping check)"
          else
            echo "✅ GROQ_API_KEY is set"
          fi

  package:
    name: Create Deployment Package
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      # 📥 Checkout again
      - name: Checkout repository
        uses: actions/checkout@v4

      # 📦 Create ZIP package
      - name: Create deployment package
        run: |
          mkdir -p dist

          zip -r dist/studyfusion-app.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".venv/*" \
            -x "venv/*" \
            -x "ENV/*" \
            -x "env/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "*.pyo" \
            -x ".pytest_cache/*" \
            -x "*.pt" \
            -x "*.bin" \
            -x "*.ckpt" \
            -x ".env" \
            -x "node_modules/*" \
            -x "dist/*"

      # ⬆️ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: studyfusion-app
          path: dist/studyfusion-app.zip
          retention-days: 14